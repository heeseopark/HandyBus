spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/handybus
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database: h2
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        # dialect: org.hibernate.dialect.h2
        format_sql: true
logging.level:
  org.hibernate.SQL: debug
